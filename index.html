<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest Review Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --color-primary: #2563eb;
      --color-primary-dark: #1e40af;
      --color-success: #10b981;
      --color-danger: #ef4444;
      --color-warning: #f59e0b;
      --color-bg: #ffffff;
      --color-bg-secondary: #f9fafb;
      --color-text-primary: #111827;
      --color-text-secondary: #6b7280;
      --color-border: #e5e7eb;
    }

    [data-theme="dark"] {
      --color-bg: #0f172a;
      --color-bg-secondary: #1e293b;
      --color-text-primary: #f8fafc;
      --color-text-secondary: #cbd5e1;
      --color-border: #334155;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      transition: all 0.2s;
    }

    .app-container {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background-color: var(--color-bg-secondary);
      border-right: 1px solid var(--color-border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--color-border);
    }

    .sidebar-brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--color-primary), #0891b2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      padding: 1rem 1.5rem;
      border-radius: 6px;
      color: var(--color-text-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-item:hover {
      color: var(--color-primary);
    }

    .nav-item.active {
      background-color: var(--color-primary);
      color: white;
    }

    .sidebar-footer {
      padding-top: 1.5rem;
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .theme-toggle {
      background-color: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-content {
      padding: 1.5rem;
      overflow-y: auto;
    }

    .page-header {
      margin-bottom: 1.5rem;
    }

    .page-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card {
      background-color: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--color-border);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
    }

    .metric-card {
      background: linear-gradient(135deg, var(--color-primary), #0891b2);
      color: white;
      padding: 1.5rem;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      font-size: 12px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .grid {
      display: grid;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background-color: var(--color-primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--color-primary-dark);
    }

    .btn-secondary {
      background-color: var(--color-bg-secondary);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }

    .btn-danger {
      background-color: var(--color-danger);
      color: white;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .table thead {
      background-color: var(--color-bg-secondary);
      border-bottom: 2px solid var(--color-border);
    }

    .table th {
      padding: 1.5rem;
      text-align: left;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
    }

    .table td {
      padding: 1.5rem;
      border-bottom: 1px solid var(--color-border);
    }

    .table tbody tr:hover {
      background-color: var(--color-bg-secondary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-primary {
      background-color: rgba(37, 99, 235, 0.1);
      color: var(--color-primary);
    }

    .badge-success {
      background-color: rgba(16, 185, 129, 0.1);
      color: var(--color-success);
    }

    .badge-danger {
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--color-danger);
    }

    .badge-warning {
      background-color: rgba(245, 158, 11, 0.1);
      color: var(--color-warning);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      padding: 10px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background-color: var(--color-bg);
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      border-bottom: 1px solid var(--color-border);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--color-text-secondary);
    }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      gap: 1rem;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
      color: var(--color-text-secondary);
    }

    .table-container {
      overflow-x: auto;
    }

    @media (max-width: 768px) {
      .app-container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        width: 260px;
        height: 100vh;
        z-index: 100;
      }

      .main-content {
        padding: 1rem;
      }

      .grid-2,
      .grid-3,
      .grid-4 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">D</div>
        <div class="sidebar-brand-text">
          <div style="font-size: 14px; font-weight: bold;">Reviews</div>
          <div style="font-size: 11px; color: var(--color-text-secondary);">Dashboard</div>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <button class="nav-item active" id="dashboardBtn" onclick="navigateTo('dashboard')">Dashboard</button>
        <button class="nav-item" id="propertiesBtn" onclick="navigateTo('properties')">Properties</button>
        <button class="nav-item" id="reviewsBtn" onclick="navigateTo('reviews')">Reviews</button>
        <button class="nav-item" id="actionsBtn" onclick="navigateTo('actions')">Action Plans</button>
      </nav>
      
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">M</button>
        <div style="flex: 1; color: var(--color-text-secondary); font-size: 12px;">
          <div id="statusIndicator">Loading...</div>
          <div id="firebaseStatus" style="margin-top: 8px; color: var(--color-success);">Connecting...</div>
        </div>
      </div>
    </aside>
    
    <main class="main-content" id="mainContent">
      <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
        <div class="loading">
          <div class="spinner"></div>
          <span>Initializing Dashboard...</span>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Firebase Configuration - UPDATED WITH YOUR CREDENTIALS
    const firebaseConfig = {
      apiKey: "AIzaSyCvg6bacuKjH7bxlq_AUJWVGZeXgWDwlIA",
      authDomain: "guestreviewdashboard.firebaseapp.com",
      projectId: "guestreviewdashboard",
      storageBucket: "guestreviewdashboard.firebasestorage.app",
      messagingSenderId: "726657937453",
      appId: "1:726657937453:web:f87dfc6273467d8051c8a4"
    };

    let db;
    let currentPage = 'dashboard';

    // Initialize Firebase
    function initializeFirebase() {
      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        console.log('Firebase initialized successfully');
        updateStatus('Connected', 'success');
        return true;
      } catch (error) {
        console.error('Firebase error:', error);
        updateStatus('Connection Error', 'error');
        return false;
      }
    }

    // Navigation
    function navigateTo(page) {
      currentPage = page;
      const container = document.getElementById('mainContent');
      
      document.querySelectorAll('.sidebar-nav .nav-item').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById(page + 'Btn').classList.add('active');
      
      switch(page) {
        case 'dashboard':
          renderDashboard(container);
          break;
        case 'properties':
          renderPropertiesPage(container);
          break;
        case 'reviews':
          renderReviewsPage(container);
          break;
        case 'actions':
          renderActionsPage(container);
          break;
      }
    }

    // Theme Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      
      const themeBtn = document.getElementById('themeToggle');
      themeBtn.textContent = newTheme === 'light' ? 'M' : 'L';
    }

    function initializeTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('themeToggle').textContent = savedTheme === 'light' ? 'M' : 'L';
    }

    function updateStatus(message, type = 'info') {
      const indicator = document.getElementById('statusIndicator');
      const statusEl = document.getElementById('firebaseStatus');
      
      indicator.textContent = message;
      
      if (type === 'success') {
        statusEl.innerHTML = 'Connected';
        statusEl.style.color = 'var(--color-success)';
      } else if (type === 'error') {
        statusEl.innerHTML = 'Error';
        statusEl.style.color = 'var(--color-danger)';
      }
    }

    // Dashboard Page
    async function renderDashboard(container) {
      container.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">Executive Dashboard</h1>
        </div>
        
        <div class="grid grid-4">
          <div class="metric-card">
            <div class="metric-label">Total Reviews</div>
            <div class="metric-value" id="totalReviews">0</div>
          </div>
          
          <div class="metric-card" style="background: linear-gradient(135deg, #10b981, #059669);">
            <div class="metric-label">Average Rating</div>
            <div class="metric-value" id="avgRating">0.0</div>
          </div>
          
          <div class="metric-card" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
            <div class="metric-label">Low Ratings</div>
            <div class="metric-value" id="lowRatings">0</div>
          </div>
          
          <div class="metric-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
            <div class="metric-label">Properties</div>
            <div class="metric-value" id="totalProperties">0</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Welcome to Guest Review Dashboard</h3>
          </div>
          <p>Your professional operational intelligence dashboard is ready!</p>
          <p style="margin-top: 1rem; color: var(--color-text-secondary);">Use the navigation menu to manage properties, add reviews, and track action plans.</p>
        </div>
      `;

      // Load dashboard data
      try {
        const reviewsSnapshot = await db.collection('reviews').get();
        const propertiesSnapshot = await db.collection('properties').get();
        
        let totalReviews = reviewsSnapshot.size;
        let totalProperties = propertiesSnapshot.size;
        let lowRatings = 0;
        let totalRating = 0;

        reviewsSnapshot.forEach(doc => {
          const rating = doc.data().rating || 0;
          totalRating += rating;
          if (rating <= 2) lowRatings++;
        });

        const avgRating = totalReviews > 0 ? (totalRating / totalReviews).toFixed(1) : 0;

        document.getElementById('totalReviews').textContent = totalReviews;
        document.getElementById('avgRating').textContent = avgRating;
        document.getElementById('lowRatings').textContent = lowRatings;
        document.getElementById('totalProperties').textContent = totalProperties;
      } catch (error) {
        console.error('Error loading dashboard:', error);
      }
    }

    // Properties Page
    async function renderPropertiesPage(container) {
      let html = `
        <div class="page-header">
          <h1 class="page-title">Properties Management</h1>
        </div>
        
        <button class="btn btn-primary" onclick="openPropertyModal()" style="margin-bottom: 20px;">Add New Property</button>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">All Properties</h3>
          </div>
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Location</th>
                  <th>Type</th>
                  <th>Reviews</th>
                  <th>Avg Rating</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="propertiesTableBody">
                <tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      `;

      html += `
        <div id="propertyModal" class="modal-overlay">
          <div class="modal">
            <div class="modal-header">
              <h3 class="modal-title">Add New Property</h3>
              <button class="modal-close" onclick="closePropertyModal()">X</button>
            </div>
            <form id="propertyForm" onsubmit="saveProperty(event)">
              <div class="modal-body">
                <div class="form-group">
                  <label class="form-label">Property Name</label>
                  <input type="text" name="propertyName" class="form-input" required />
                </div>
                <div class="form-group">
                  <label class="form-label">Location</label>
                  <input type="text" name="location" class="form-input" required />
                </div>
                <div class="form-group">
                  <label class="form-label">City</label>
                  <input type="text" name="city" class="form-input" required />
                </div>
                <div class="form-group">
                  <label class="form-label">Unit Type</label>
                  <select name="unitType" class="form-select" required>
                    <option value="">Select type</option>
                    <option value="Studio">Studio</option>
                    <option value="1BR">1BR</option>
                    <option value="2BR">2BR</option>
                    <option value="3BR">3BR</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Platform</label>
                  <select name="platform" class="form-select" required>
                    <option value="">Select platform</option>
                    <option value="Airbnb">Airbnb</option>
                    <option value="Booking.com">Booking.com</option>
                    <option value="Direct">Direct</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Owner</label>
                  <input type="text" name="owner" class="form-input" required />
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closePropertyModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
              </div>
            </form>
          </div>
        </div>
      `;

      container.innerHTML = html;
      loadProperties();
    }

    async function loadProperties() {
      try {
        const snapshot = await db.collection('properties').get();
        const tbody = document.getElementById('propertiesTableBody');
        
        if (snapshot.empty) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No properties yet</td></tr>';
          return;
        }

        let rows = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          rows += `
            <tr>
              <td><strong>${data.propertyName}</strong></td>
              <td>${data.location}</td>
              <td>${data.unitType}</td>
              <td>${data.totalReviews || 0}</td>
              <td>${(data.averageRating || 0).toFixed(1)}</td>
              <td>
                <button class="btn btn-danger" onclick="deleteProperty('${doc.id}')" style="font-size: 12px;">Delete</button>
              </td>
            </tr>
          `;
        });

        tbody.innerHTML = rows;
      } catch (error) {
        console.error('Error loading properties:', error);
      }
    }

    function openPropertyModal() {
      document.getElementById('propertyModal').classList.add('active');
    }

    function closePropertyModal() {
      document.getElementById('propertyModal').classList.remove('active');
      document.getElementById('propertyForm').reset();
    }

    async function saveProperty(event) {
      event.preventDefault();
      
      const form = event.target;
      const data = {
        propertyName: form.propertyName.value,
        location: form.location.value,
        city: form.city.value,
        unitType: form.unitType.value,
        platform: form.platform.value,
        owner: form.owner.value,
        status: 'Active',
        totalReviews: 0,
        averageRating: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        await db.collection('properties').add(data);
        closePropertyModal();
        alert('Property added successfully!');
        await renderPropertiesPage(document.getElementById('mainContent'));
      } catch (error) {
        alert('Error: ' + error.message);
        console.error('Save error:', error);
      }
    }

    async function deleteProperty(id) {
      if (confirm('Are you sure you want to delete this property?')) {
        try {
          await db.collection('properties').doc(id).delete();
          await renderPropertiesPage(document.getElementById('mainContent'));
        } catch (error) {
          alert('Error: ' + error.message);
        }
      }
    }

    // Reviews Page
    async function renderReviewsPage(container) {
      let html = `
        <div class="page-header">
          <h1 class="page-title">Review Intelligence</h1>
        </div>
        
        <button class="btn btn-primary" onclick="openReviewModal()" style="margin-bottom: 20px;">Add New Review</button>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Recent Reviews</h3>
          </div>
          <div id="reviewsList"></div>
        </div>
      `;

      html += `
        <div id="reviewModal" class="modal-overlay">
          <div class="modal">
            <div class="modal-header">
              <h3 class="modal-title">Add New Review</h3>
              <button class="modal-close" onclick="closeReviewModal()">X</button>
            </div>
            <form id="reviewForm" onsubmit="saveReview(event)">
              <div class="modal-body">
                <div class="form-group">
                  <label class="form-label">Guest Name</label>
                  <input type="text" name="guestName" class="form-input" required />
                </div>
                <div class="form-group">
                  <label class="form-label">Rating</label>
                  <select name="rating" class="form-select" required>
                    <option value="">Select rating</option>
                    <option value="1">1 - Poor</option>
                    <option value="2">2 - Fair</option>
                    <option value="3">3 - Good</option>
                    <option value="4">4 - Very Good</option>
                    <option value="5">5 - Excellent</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Platform</label>
                  <select name="platform" class="form-select" required>
                    <option value="">Select platform</option>
                    <option value="Airbnb">Airbnb</option>
                    <option value="Booking.com">Booking.com</option>
                    <option value="Direct">Direct</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Comment</label>
                  <textarea name="comment" class="form-textarea" placeholder="Guest feedback..."></textarea>
                </div>
                <div class="form-group">
                  <label class="form-label">Sentiment</label>
                  <select name="sentiment" class="form-select">
                    <option value="Neutral">Neutral</option>
                    <option value="Positive">Positive</option>
                    <option value="Negative">Negative</option>
                  </select>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeReviewModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
              </div>
            </form>
          </div>
        </div>
      `;

      container.innerHTML = html;
      await loadReviews();
    }

    async function loadReviews() {
      try {
        const snapshot = await db.collection('reviews').orderBy('createdAt', 'desc').get();
        const reviewsList = document.getElementById('reviewsList');
        
        if (snapshot.empty) {
          reviewsList.innerHTML = '<div class="empty-state"><p>No reviews yet</p></div>';
          return;
        }

        let html = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const badgeClass = data.rating <= 2 ? 'danger' : data.rating <= 4 ? 'warning' : 'success';
          
          html += `
            <div style="padding: 1rem; border-bottom: 1px solid var(--color-border);">
              <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                <div>
                  <strong>${data.guestName}</strong>
                  <span class="badge badge-${badgeClass}" style="margin-left: 0.5rem;">${data.rating}/5</span>
                </div>
                <button class="btn btn-danger" onclick="deleteReview('${doc.id}')" style="font-size: 12px;">Delete</button>
              </div>
              <p style="margin-bottom: 0.5rem; color: var(--color-text-secondary);">${data.comment || 'No comment'}</p>
              <div style="font-size: 12px;">
                <span class="badge badge-primary">${data.platform}</span>
                <span class="badge badge-${data.sentiment === 'Positive' ? 'success' : data.sentiment === 'Negative' ? 'danger' : 'primary'}" style="margin-left: 0.5rem;">
                  ${data.sentiment}
                </span>
              </div>
            </div>
          `;
        });

        reviewsList.innerHTML = html;
      } catch (error) {
        console.error('Error loading reviews:', error);
      }
    }

    function openReviewModal() {
      document.getElementById('reviewModal').classList.add('active');
    }

    function closeReviewModal() {
      document.getElementById('reviewModal').classList.remove('active');
      document.getElementById('reviewForm').reset();
    }

    async function saveReview(event) {
      event.preventDefault();
      
      const form = event.target;
      const rating = parseInt(form.rating.value);
      const ratingCategory = rating <= 2 ? 'Low' : rating <= 4 ? 'Medium' : 'High';

      const data = {
        guestName: form.guestName.value,
        rating: rating,
        ratingCategory: ratingCategory,
        platform: form.platform.value,
        comment: form.comment.value,
        sentiment: form.sentiment.value,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        archived: false
      };

      try {
        await db.collection('reviews').add(data);
        closeReviewModal();
        alert('Review added successfully!');
        await renderReviewsPage(document.getElementById('mainContent'));
      } catch (error) {
        alert('Error: ' + error.message);
        console.error('Save error:', error);
      }
    }

    async function deleteReview(id) {
      if (confirm('Are you sure you want to delete this review?')) {
        try {
          await db.collection('reviews').doc(id).delete();
          await renderReviewsPage(document.getElementById('mainContent'));
        } catch (error) {
          alert('Error: ' + error.message);
        }
      }
    }

    // Actions Page
    async function renderActionsPage(container) {
      let html = `
        <div class="page-header">
          <h1 class="page-title">Action Plans</h1>
        </div>
        
        <button class="btn btn-primary" onclick="openActionModal()" style="margin-bottom: 20px;">Create Action Plan</button>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">All Action Plans</h3>
          </div>
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>Issue</th>
                  <th>Impact</th>
                  <th>Assigned To</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="actionsTableBody">
                <tr><td colspan="5" style="text-align: center; padding: 2rem;">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      `;

      html += `
        <div id="actionModal" class="modal-overlay">
          <div class="modal">
            <div class="modal-header">
              <h3 class="modal-title">Create Action Plan</h3>
              <button class="modal-close" onclick="closeActionModal()">X</button>
            </div>
            <form id="actionForm" onsubmit="saveAction(event)">
              <div class="modal-body">
                <div class="form-group">
                  <label class="form-label">Issue Category</label>
                  <select name="issueCategory" class="form-select" required>
                    <option value="">Select category</option>
                    <option value="Cleaning">Cleaning</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="Communication">Communication</option>
                    <option value="Check-in">Check-in</option>
                    <option value="Noise">Noise</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Impact Level</label>
                  <select name="impactLevel" class="form-select" required>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Assigned To</label>
                  <input type="text" name="assignedTo" class="form-input" required />
                </div>
                <div class="form-group">
                  <label class="form-label">Action Description</label>
                  <textarea name="actionDescription" class="form-textarea" required></textarea>
                </div>
                <div class="form-group">
                  <label class="form-label">Status</label>
                  <select name="status" class="form-select">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                  </select>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeActionModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Create</button>
              </div>
            </form>
          </div>
        </div>
      `;

      container.innerHTML = html;
      loadActions();
    }

    async function loadActions() {
      try {
        const snapshot = await db.collection('actionPlans').get();
        const tbody = document.getElementById('actionsTableBody');
        
        if (snapshot.empty) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">No action plans yet</td></tr>';
          return;
        }

        let rows = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          
          rows += `
            <tr>
              <td><strong>${data.issueCategory}</strong></td>
              <td><span class="badge badge-${data.impactLevel === 'High' ? 'danger' : 'warning'}">${data.impactLevel}</span></td>
              <td>${data.assignedTo}</td>
              <td><span class="badge badge-${data.status === 'Completed' ? 'success' : 'primary'}">${data.status || 'Pending'}</span></td>
              <td>
                <button class="btn btn-danger" onclick="deleteAction('${doc.id}')" style="font-size: 12px;">Delete</button>
              </td>
            </tr>
          `;
        });

        tbody.innerHTML = rows;
      } catch (error) {
        console.error('Error loading actions:', error);
      }
    }

    function openActionModal() {
      document.getElementById('actionModal').classList.add('active');
    }

    function closeActionModal() {
      document.getElementById('actionModal').classList.remove('active');
      document.getElementById('actionForm').reset();
    }

    async function saveAction(event) {
      event.preventDefault();
      
      const form = event.target;
      const data = {
        issueCategory: form.issueCategory.value,
        impactLevel: form.impactLevel.value,
        assignedTo: form.assignedTo.value,
        actionDescription: form.actionDescription.value,
        status: form.status.value,
        frequency: 1,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        resolvedAt: null
      };

      try {
        await db.collection('actionPlans').add(data);
        closeActionModal();
        alert('Action plan created successfully!');
        await renderActionsPage(document.getElementById('mainContent'));
      } catch (error) {
        alert('Error: ' + error.message);
        console.error('Save error:', error);
      }
    }

    async function deleteAction(id) {
      if (confirm('Are you sure you want to delete this action plan?')) {
        try {
          await db.collection('actionPlans').doc(id).delete();
          await renderActionsPage(document.getElementById('mainContent'));
        } catch (error) {
          alert('Error: ' + error.message);
        }
      }
    }

    // Initialize App
    async function initializeApp() {
      try {
        initializeTheme();
        const success = initializeFirebase();
        
        if (success) {
          navigateTo('dashboard');
        } else {
          alert('Failed to initialize Firebase');
        }
      } catch (error) {
        console.error('Initialization error:', error);
      }
    }

    // Global functions
    window.navigateTo = navigateTo;
    window.toggleTheme = toggleTheme;
    window.openPropertyModal = openPropertyModal;
    window.closePropertyModal = closePropertyModal;
    window.saveProperty = saveProperty;
    window.deleteProperty = deleteProperty;
    window.openReviewModal = openReviewModal;
    window.closeReviewModal = closeReviewModal;
    window.saveReview = saveReview;
    window.deleteReview = deleteReview;
    window.openActionModal = openActionModal;
    window.closeActionModal = closeActionModal;
    window.saveAction = saveAction;
    window.deleteAction = deleteAction;

    // Start
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeApp);
    } else {
      initializeApp();
    }
  </script>
</body>
</html>

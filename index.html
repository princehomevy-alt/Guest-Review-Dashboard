<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guest Review Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --color-primary: #2563eb;
      --color-primary-dark: #1e40af;
      --color-success: #10b981;
      --color-danger: #ef4444;
      --color-warning: #f59e0b;
      --color-bg: #ffffff;
      --color-bg-secondary: #f9fafb;
      --color-text-primary: #111827;
      --color-text-secondary: #6b7280;
      --color-border: #e5e7eb;
    }
    [data-theme="dark"] {
      --color-bg: #0f172a;
      --color-bg-secondary: #1e293b;
      --color-text-primary: #f8fafc;
      --color-text-secondary: #cbd5e1;
      --color-border: #334155;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-primary);
      transition: all 0.2s;
    }

    /* LOGIN PAGE STYLES */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--color-primary), #0891b2);
    }
    .login-box {
      background: var(--color-bg);
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, var(--color-primary), #0891b2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
    }
    .login-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .login-subtitle {
      color: var(--color-text-secondary);
      font-size: 0.95rem;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-label {
      font-weight: 500;
      font-size: 0.9rem;
    }
    .form-input {
      padding: 0.75rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      font-size: 1rem;
      background: var(--color-bg);
      color: var(--color-text-primary);
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .login-btn {
      padding: 0.85rem 1.5rem;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .login-btn:hover {
      background: var(--color-primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(37,99,235,0.3);
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .login-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid var(--color-danger);
      color: var(--color-danger);
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }
    .login-error.show {
      display: block;
    }
    .login-loading {
      display: none;
      text-align: center;
    }
    .spinner-small {
      width: 20px;
      height: 20px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* DASHBOARD STYLES */
    .app-container {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--color-bg-secondary);
      border-right: 1px solid var(--color-border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow-y: auto;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--color-border);
    }
    .sidebar-brand-icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--color-primary), #0891b2);
      color: white;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .nav-item {
      padding: 0.9rem 1.4rem;
      border-radius: 6px;
      color: var(--color-text-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      transition: all 0.15s;
    }
    .nav-item:hover { color: var(--color-primary); background: rgba(37,99,235,0.07); }
    .nav-item.active { background: var(--color-primary); color: white; }
    .sidebar-footer {
      padding-top: 1.5rem;
      border-top: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .user-info {
      font-size: 0.85rem;
      padding: 0.75rem;
      background: rgba(37,99,235,0.1);
      border-radius: 6px;
      color: var(--color-text-secondary);
    }
    .logout-btn {
      padding: 0.6rem 1rem;
      background: var(--color-danger);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .logout-btn:hover {
      background: #dc2626;
    }
    .theme-toggle {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
    }
    .main-content {
      padding: 1.5rem 2rem;
      overflow-y: auto;
    }
    .page-header { 
      margin-bottom: 1.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .page-title { font-size: 1.8rem; font-weight: 600; }
    .card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--color-border);
    }
    .card-title { font-size: 1.25rem; font-weight: 600; }
    .metric-card {
      color: white;
      padding: 1.5rem;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--color-primary), #0891b2);
    }
    .metric-label {
      font-size: 0.8rem;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }
    .metric-value { font-size: 2.2rem; font-weight: 700; }
    .grid { display: grid; gap: 1.5rem; margin-bottom: 1.5rem; }
    .grid-4 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    .btn {
      padding: 0.6rem 1.1rem;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-primary:hover { background: var(--color-primary-dark); }
    .btn-secondary { background: var(--color-bg-secondary); color: var(--color-text-primary); border: 1px solid var(--color-border); }
    .btn-danger { background: var(--color-danger); color: white; }
    .btn-edit { background: var(--color-warning); color: white; }
    .btn-edit:hover { background: #d97706; }
    .table { width:100%; border-collapse: collapse; font-size: 14px; }
    .table thead {
      background: var(--color-bg-secondary);
      border-bottom: 2px solid var(--color-border);
    }
    .table th, .table td { padding: 1rem; text-align: left; }
    .table tbody tr { cursor: pointer; transition: background 0.15s; }
    .table tbody tr:hover { background: rgba(37,99,235,0.07); }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--color-success); }
    .badge-danger { background: rgba(239,68,68,0.1); color: var(--color-danger); }
    .badge-warning { background: rgba(245,158,11,0.1); color: var(--color-warning); }
    .badge-primary { background: rgba(37,99,235,0.1); color: var(--color-primary); }
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--color-bg);
      border-radius: 12px;
      width: 90%;
      max-width: 520px;
      max-height: 92vh;
      overflow-y: auto;
      margin: auto;
    }
    .modal-header {
      padding: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--color-border);
    }
    .modal-title { font-size: 1.25rem; font-weight: 600; }
    .modal-close { background:none; border:none; font-size: 1.6rem; cursor:pointer; color: var(--color-text-secondary); }
    .modal-body { padding: 1.5rem; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--color-border); display: flex; justify-content: flex-end; gap: 1rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { font-weight: 500; margin-bottom: 0.4rem; display: block; font-size: 0.9rem; }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      font-size: 14px;
      background: var(--color-bg);
      color: var(--color-text-primary);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .form-textarea { min-height: 110px; resize: vertical; }
    .chart-container { position: relative; height: 320px; }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem 1rem;
      color: var(--color-text-secondary);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 4px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .risk-banner {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      color: #92400e;
      padding: 1.25rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 1rem;
    }
    .action-item {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .action-info { flex: 1; }
    .action-title { font-weight: 600; margin-bottom: 0.5rem; }
    .action-desc { font-size: 0.9rem; color: var(--color-text-secondary); margin: 0.5rem 0; }
    .action-buttons { display: flex; gap: 0.5rem; }
    .hidden { display: none !important; }
    @media (max-width: 992px) {
      .app-container { grid-template-columns: 1fr; }
      .sidebar { position: fixed; z-index: 900; transform: translateX(-100%); transition: transform 0.3s; width: 260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { padding: 1rem; }
      .grid-4, .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .action-item { flex-direction: column; }
      .action-buttons { width: 100%; gap: 0.5rem; margin-top: 0.75rem; }
      .action-buttons .btn { flex: 1; }
    }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
  <div class="login-box">
    <div class="login-header">
      <div class="login-icon">🔐</div>
      <h1 class="login-title">Guest Reviews</h1>
      <p class="login-subtitle">Admin Dashboard Login</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)" class="login-form">
      <div id="loginError" class="login-error"></div>
      
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="admin@guestreviews.com" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
      </div>

      <div id="loginLoading" class="login-loading">
        <div class="spinner-small"></div>
        <span>Logging in...</span>
      </div>

      <button type="submit" id="loginBtn" class="login-btn">Login</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--color-text-secondary);">
      Demo: admin@guestreviews.com / Admin@123456
    </div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage" class="hidden">
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">GR</div>
        <div>
          <div style="font-weight:600;">Guest Reviews</div>
          <div style="font-size:0.78rem; opacity:0.7;">Dashboard</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="navigateTo('dashboard')">📊 Dashboard</button>
        <button class="nav-item" onclick="navigateTo('analytics')">📈 Property Analytics</button>
        <button class="nav-item" onclick="navigateTo('properties')">🏠 Properties</button>
        <button class="nav-item" onclick="navigateTo('reviews')">⭐ Reviews</button>
        <button class="nav-item" onclick="navigateTo('actions')">✓ Action Plans</button>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">☀️</button>
        <div class="user-info">
          <div style="font-weight: 500; margin-bottom: 0.5rem;">Logged in as:</div>
          <div id="userEmail" style="word-break: break-all;"></div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="loading">
        <div class="spinner"></div>
        <span>Loading dashboard...</span>
      </div>
    </main>
  </div>
</div>

<!-- PROPERTY MODALS -->
<div id="propertyModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Add New Property</h3>
      <button class="modal-close" onclick="closePropertyModal()">×</button>
    </div>
    <form id="propertyForm" onsubmit="saveProperty(event)">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Property Name *</label>
          <input type="text" name="propertyName" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Location *</label>
          <input type="text" name="location" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">City *</label>
          <input type="text" name="city" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Unit Type *</label>
          <select name="unitType" class="form-select" required>
            <option value="">Select...</option>
            <option>Studio</option>
            <option>1BR</option>
            <option>2BR</option>
            <option>3BR</option>
            <option>4BR</option>
            <option>Villa</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Platform *</label>
          <select name="platform" class="form-select" required>
            <option value="">Select...</option>
            <option>All Platforms</option>
            <option>Airbnb</option>
            <option>Booking.com</option>
            <option>Vrbo</option>
            <option>Direct</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Owner *</label>
          <input type="text" name="owner" class="form-input" required>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closePropertyModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Property</button>
      </div>
    </form>
  </div>
</div>

<div id="editPropertyModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Edit Property</h3>
      <button class="modal-close" onclick="closeEditPropertyModal()">×</button>
    </div>
    <form id="editPropertyForm" onsubmit="updateProperty(event)">
      <div class="modal-body">
        <input type="hidden" name="propertyId">
        <div class="form-group">
          <label class="form-label">Property Name *</label>
          <input type="text" name="propertyName" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Location *</label>
          <input type="text" name="location" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">City *</label>
          <input type="text" name="city" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Unit Type *</label>
          <select name="unitType" class="form-select" required>
            <option>Studio</option>
            <option>1BR</option>
            <option>2BR</option>
            <option>3BR</option>
            <option>4BR</option>
            <option>Villa</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Platform *</label>
          <select name="platform" class="form-select" required>
            <option>All Platforms</option>
            <option>Airbnb</option>
            <option>Booking.com</option>
            <option>Vrbo</option>
            <option>Direct</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Owner *</label>
          <input type="text" name="owner" class="form-input" required>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeEditPropertyModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<!-- REVIEW MODALS -->
<div id="reviewModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Add Review</h3>
      <button class="modal-close" onclick="closeReviewModal()">×</button>
    </div>
    <form id="reviewForm" onsubmit="saveReview(event)">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Property *</label>
          <select id="reviewPropertySelect" class="form-select" required>
            <option value="">Select Property...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Guest Name *</label>
          <input type="text" name="guestName" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Rating *</label>
          <select name="rating" class="form-select" required>
            <option value="">Select...</option>
            <option value="1">1 - Poor</option>
            <option value="2">2 - Fair</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Very Good</option>
            <option value="5">5 - Excellent</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Platform *</label>
          <select name="platform" class="form-select" required>
            <option value="">Select...</option>
            <option>Airbnb</option>
            <option>Booking.com</option>
            <option>Vrbo</option>
            <option>Direct</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Checkout Date *</label>
          <input type="date" name="checkoutDate" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Comment</label>
          <textarea name="comment" class="form-textarea" placeholder="Guest feedback..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeReviewModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Review</button>
      </div>
    </form>
  </div>
</div>

<div id="editReviewModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Edit Review</h3>
      <button class="modal-close" onclick="closeEditReviewModal()">×</button>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCvg6bacuKjH7bxlq_AUJWVGZeXgWDwlIA",
    authDomain: "guestreviewdashboard.firebaseapp.com",
    projectId: "guestreviewdashboard",
    storageBucket: "guestreviewdashboard.firebasestorage.app",
    messagingSenderId: "726657937453",
    appId: "1:726657937453:web:f87dfc6273467d8051c8a4"
  };

  let db;
  let auth;
  let currentUser = null;
  let currentPage = 'dashboard';

  function initializeFirebase() {
    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      auth = firebase.auth();
      
      auth.onAuthStateChanged(user => {
        if (user) {
          currentUser = user;
          showDashboard();
          document.getElementById('userEmail').textContent = user.email;
          navigateTo('dashboard');
        } else {
          showLogin();
        }
      });
      
      return true;
    } catch (err) {
      console.error("Firebase init failed", err);
      return false;
    }
  }

  function showLogin() {
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('dashboardPage').classList.add('hidden');
  }

  function showDashboard() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('dashboardPage').classList.remove('hidden');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const loginBtn = document.getElementById('loginBtn');
    const loginLoading = document.getElementById('loginLoading');
    const loginError = document.getElementById('loginError');

    loginError.classList.remove('show');
    loginBtn.disabled = true;
    loginLoading.style.display = 'block';

    try {
      await auth.signInWithEmailAndPassword(email, password);
      loginLoading.style.display = 'none';
    } catch (err) {
      loginLoading.style.display = 'none';
      loginBtn.disabled = false;
      loginError.textContent = 'Invalid email or password. Please try again.';
      loginError.classList.add('show');
      console.error("Login error:", err);
    }
  }

  function handleLogout() {
    if (confirm('Are you sure you want to logout?')) {
      auth.signOut().then(() => {
        currentUser = null;
        document.getElementById('loginForm').reset();
        showLogin();
      }).catch(err => {
        alert('Logout error: ' + err.message);
      });
    }
  }

  function toggleTheme() {
    const html = document.documentElement;
    const theme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    document.getElementById('themeToggle').textContent = theme === 'light' ? '☀️' : '🌙';
  }

  function loadTheme() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('themeToggle').textContent = saved === 'light' ? '☀️' : '🌙';
  }

  function navigateTo(page) {
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelector(`[onclick="navigateTo('${page}')"]`).classList.add('active');
    const content = document.getElementById('mainContent');
    
    if (page === 'dashboard') renderDashboard(content);
    else if (page === 'analytics') renderAnalyticsPage(content);
    else if (page === 'properties') renderPropertiesPage(content);
    else if (page === 'reviews') renderReviewsPage(content);
    else if (page === 'actions') renderActionsPage(content);
  }

  // ========== DASHBOARD PAGE ==========
  async function renderDashboard(container) {
    container.innerHTML = `
      <div class="page-header">
        <h1 class="page-title">Executive Dashboard</h1>
      </div>
      <div class="grid grid-4">
        <div class="metric-card">
          <div class="metric-label">Total Reviews</div>
          <div class="metric-value" id="totalReviews">—</div>
        </div>
        <div class="metric-card" style="background: linear-gradient(135deg, #10b981, #059669);">
          <div class="metric-label">Average Rating</div>
          <div class="metric-value" id="avgRating">—</div>
        </div>
        <div class="metric-card" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
          <div class="metric-label">Low Ratings (≤2)</div>
          <div class="metric-value" id="lowRatings">—</div>
        </div>
        <div class="metric-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
          <div class="metric-label">Total Properties</div>
          <div class="metric-value" id="totalProperties">—</div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Welcome to Your Dashboard</h3>
        </div>
        <p>Manage your guest reviews operational intelligence. Navigate using the sidebar menu to access properties, reviews, and action tracking.</p>
        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--color-text-secondary);">Start by adding properties and reviews to see analytics.</p>
      </div>
    `;

    try {
      const [revs, props] = await Promise.all([
        db.collection('reviews').get(),
        db.collection('properties').get()
      ]);

      let totalReviews = revs.size;
      let totalRating = 0;
      let lowRatings = 0;

      revs.forEach(d => {
        const r = Number(d.data().rating) || 0;
        totalRating += r;
        if (r <= 2) lowRatings++;
      });

      const avgRating = totalReviews > 0 ? (totalRating / totalReviews).toFixed(1) : 0;

      document.getElementById('totalReviews').textContent = totalReviews;
      document.getElementById('avgRating').textContent = avgRating;
      document.getElementById('lowRatings').textContent = lowRatings;
      document.getElementById('totalProperties').textContent = props.size;

    } catch (err) {
      console.error("Dashboard error:", err);
    }
  }

  // ========== ANALYTICS PAGE ==========
  async function renderAnalyticsPage(container) {
    container.innerHTML = `
      <div class="page-header">
        <h1 class="page-title">Property Analytics</h1>
      </div>
      <div class="grid grid-3">
        <div class="metric-card">
          <div class="metric-label">Total Properties</div>
          <div class="metric-value" id="analyticsTotal">—</div>
        </div>
        <div class="metric-card" style="background: linear-gradient(135deg, #10b981, #059669);">
          <div class="metric-label">Top Performers</div>
          <div class="metric-value" id="analyticsTop">—</div>
        </div>
        <div class="metric-card" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
          <div class="metric-label">Needs Improvement</div>
          <div class="metric-value" id="analyticsLow">—</div>
        </div>
      </div>
      <div id="analyticsContent"></div>
    `;

    try {
      const propsSnap = await db.collection('properties').get();
      const revSnap = await db.collection('reviews').get();

      let topPerformers = [];
      let needsImprovement = [];

      propsSnap.forEach(doc => {
        const d = doc.data();
        const avgRating = Number(d.averageRating) || 0;
        if (avgRating >= 4.5) topPerformers.push({...d, id: doc.id});
        else if (avgRating < 3.5 && d.totalReviews > 0) needsImprovement.push({...d, id: doc.id});
      });

      document.getElementById('analyticsTotal').textContent = propsSnap.size;
      document.getElementById('analyticsTop').textContent = topPerformers.length;
      document.getElementById('analyticsLow').textContent = needsImprovement.length;

      let html = '<div class="card"><div class="card-header"><h3 class="card-title">⭐ Top Performing Properties (4.5+ rating)</h3></div><div style="padding:1rem;">';
      if (topPerformers.length === 0) {
        html += '<p>No top performers yet.</p>';
      } else {
        topPerformers.forEach(p => {
          html += `<div style="padding:0.75rem; border-bottom:1px solid var(--color-border);"><strong>${p.propertyName}</strong> - ${p.averageRating}⭐ (${p.totalReviews} reviews)</div>`;
        });
      }
      html += '</div></div>';

      html += '<div class="card"><div class="card-header"><h3 class="card-title">🔴 Properties Needing Improvement (&lt;3.5 rating)</h3></div><div style="padding:1rem;">';
      if (needsImprovement.length === 0) {
        html += '<p>All properties are doing well!</p>';
      } else {
        needsImprovement.forEach(p => {
          html += `<div style="padding:0.75rem; border-bottom:1px solid var(--color-border);"><strong>${p.propertyName}</strong> - ${p.averageRating}⭐ (${p.totalReviews} reviews)</div>`;
        });
      }
      html += '</div></div>';

      document.getElementById('analyticsContent').innerHTML = html;

    } catch (err) {
      console.error("Analytics error:", err);
    }
  }

      await db.collection('properties').doc(id).update({

  async function deleteProperty(id) {
    if (!confirm("Delete this property? This will also delete all associated reviews and actions.")) return;
    try {
      await db.collection('properties').doc(id).delete();
      const reviews = await db.collection('reviews').where('propertyId', '==', id).get();
      reviews.forEach(doc => doc.ref.delete());
      const actions = await db.collection('actionPlans').where('propertyId', '==', id).get();
      actions.forEach(doc => doc.ref.delete());
      await renderPropertiesPage(document.getElementById('mainContent'));
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  async function saveReview(e) {
    e.preventDefault();
    const form = e.target;
    const propertyId = document.getElementById('reviewPropertySelect').value;
    if (!propertyId) {
      alert('Please select a property');
      return;
    }
    try {
      const rating = Number(form.rating.value);
      const checkoutDate = firebase.firestore.Timestamp.fromDate(new Date(form.checkoutDate.value));
      const reviewMonth = form.checkoutDate.value.substring(0, 7);

      await db.collection('reviews').add({
        propertyId: propertyId,
        guestName: form.guestName.value.trim(),
        rating: rating,
        platform: form.platform.value,
        comment: form.comment.value.trim(),
        checkoutDate: checkoutDate,
        reviewMonth: reviewMonth,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      const propDoc = await db.collection('properties').doc(propertyId).get();
      const currentData = propDoc.data();
      const oldCount = currentData.totalReviews || 0;
      const oldRating = currentData.averageRating || 0;
      const newCount = oldCount + 1;
      const newRating = ((oldRating * oldCount) + rating) / newCount;
      await db.collection('properties').doc(propertyId).update({
        totalReviews: newCount,
        averageRating: Math.round(newRating * 10) / 10
      });

      closeReviewModal();
      await renderReviewsPage(document.getElementById('mainContent'));
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  async function updateReview(e) {
    e.preventDefault();
    const form = e.target;
    const reviewId = form.querySelector('[name="reviewId"]').value;
    const newRating = Number(form.querySelector('[name="rating"]').value);
    
    try {
      const reviewDoc = await db.collection('reviews').doc(reviewId).get();
      const oldReviewData = reviewDoc.data();
      const oldRating = Number(oldReviewData.rating) || 0;
      const propertyId = oldReviewData.propertyId;

      await db.collection('reviews').doc(reviewId).update({
        propertyId: form.querySelector('[name="propertyId"]').value,
        guestName: form.querySelector('[name="guestName"]').value.trim(),
        rating: newRating,
        platform: form.querySelector('[name="platform"]').value,
        comment: form.querySelector('[name="comment"]').value.trim(),
        checkoutDate: firebase.firestore.Timestamp.fromDate(new Date(form.querySelector('[name="checkoutDate"]').value))
      });

      // Recalculate property rating
      const reviewsSnap = await db.collection('reviews').where('propertyId', '==', propertyId).get();
      if (reviewsSnap.empty) {
        await db.collection('properties').doc(propertyId).update({ totalReviews: 0, averageRating: 0 });
      } else {
        let totalRating = 0;
        reviewsSnap.forEach(doc => totalRating += Number(doc.data().rating) || 0);
        const newAvgRating = Math.round((totalRating / reviewsSnap.size) * 10) / 10;
        await db.collection('properties').doc(propertyId).update({
          totalReviews: reviewsSnap.size,
          averageRating: newAvgRating
        });
      }

      closeEditReviewModal();
      await renderReviewsPage(document.getElementById('mainContent'));
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  async function deleteReview(id) {
    if (!confirm("Delete this review?")) return;
    try {
      const reviewDoc = await db.collection('reviews').doc(id).get();
      const reviewData = reviewDoc.data();
      const propertyId = reviewData.propertyId;
      await db.collection('reviews').doc(id).delete();

      if (propertyId) {
        const reviewsSnap = await db.collection('reviews').where('propertyId', '==', propertyId).get();
        if (reviewsSnap.empty) {
          await db.collection('properties').doc(propertyId).update({ totalReviews: 0, averageRating: 0 });
        } else {
          let totalRating = 0;
          reviewsSnap.forEach(doc => totalRating += Number(doc.data().rating) || 0);
          const newRating = Math.round((totalRating / reviewsSnap.size) * 10) / 10;
          await db.collection('properties').doc(propertyId).update({
            totalReviews: reviewsSnap.size,
            averageRating: newRating
          });
        }
      }
      await renderReviewsPage(document.getElementById('mainContent'));
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  // ========== ACTION PLANS PAGE ==========
  async function renderActionsPage(container) {
    container.innerHTML = `
      <div class="page-header">
        <h1 class="page-title">Action Plans</h1>
        <button class="btn btn-primary" onclick="openActionModal()">+ Create Action</button>
      </div>
      <div class="card">
        <div id="actionsList" style="padding:1rem;"></div>
      </div>
    `;
    await loadActionsDropdown();
    await loadActions();
  }

  async function loadActionsDropdown() {
    try {
      const snap = await db.collection('properties').get();
      const select = document.getElementById('actionPropertySelect');
      const editSelect = document.getElementById('editActionPropertySelect');
      let html = '<option value="">Select Property...</option>';
      snap.forEach(doc => html += `<option value="${doc.id}">${doc.data().propertyName}</option>`);
      select.innerHTML = html;
      editSelect.innerHTML = html;
    } catch (err) { console.error(err); }
  }

  async function loadActions() {
    try {
      const snap = await db.collection('actionPlans').get();
      const container = document.getElementById('actionsList');
      if (snap.empty) {
        container.innerHTML = '<p>No action plans yet. Create your first action to get started.</p>';
        return;
      }
      const propsSnap = await db.collection('properties').get();
      const propsMap = {};
      propsSnap.forEach(doc => propsMap[doc.id] = doc.data().propertyName);
      let html = '';
      snap.forEach(doc => {
        const d = doc.data();
        const propName = propsMap[d.propertyId] || 'Unknown';
        const impactColor = d.impactLevel === 'High' ? '#ef4444' : d.impactLevel === 'Medium' ? '#f59e0b' : '#10b981';
        const statusColor = d.status === 'Completed' ? '#10b981' : d.status === 'In Progress' ? '#f59e0b' : '#6b7280';
        html += `
          <div class="action-item">
            <div class="action-info">
              <div class="action-title">${propName}</div>
              <div style="font-size:0.9rem; color:var(--color-text-secondary); margin:0.5rem 0;">
                <strong>${d.issueCategory}</strong> • Impact: <span style="color:${impactColor}; font-weight:600;">${d.impactLevel}</span>
              </div>
              <div class="action-desc">${d.actionDescription}</div>
              <div style="font-size:0.85rem; color:var(--color-text-secondary); margin-top:0.5rem;">
                Assigned: <strong>${d.assignedTo}</strong> • Status: <span style="color:${statusColor}; font-weight:600;">${d.status}</span>
              </div>
            </div>
            <div class="action-buttons">
              <button class="btn btn-edit" onclick="openEditActionModal('${doc.id}')">Edit</button>
              <button class="btn btn-danger" onclick="deleteAction('${doc.id}')">Delete</button>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    } catch (err) { console.error(err); }
  }

  function openActionModal() { document.getElementById('actionModal').classList.add('active'); }
  function closeActionModal() {
    document.getElementById('actionModal').classList.remove('active');
    document.getElementById('actionForm')?.reset();
  }

  async function openEditActionModal(id) {
    try {
      const doc = await db.collection('actionPlans').doc(id).get();
      const d = doc.data();
      const form = document.getElementById('editActionForm');
      form.querySelector('[name="actionId"]').value = id;
      form.querySelector('[name="propertyId"]').value = d.propertyId;
      form.querySelector('[name="issueCategory"]').value = d.issueCategory;
      form.querySelector('[name="impactLevel"]').value = d.impactLevel;
      form.querySelector('[name="assignedTo"]').value = d.assignedTo;
      form.querySelector('[name="actionDescription"]').value = d.actionDescription;
      form.querySelector('[name="status"]').value = d.status;
      document.getElementById('editActionModal').classList.add('active');
    } catch (err) {
      alert('Error loading action');
    }
  }

  function closeEditActionModal() {
    document.getElementById('editActionModal').classList.remove('active');
  }

  async function saveAction(e) {
    e.preventDefault();
    const form = e.target;
    const propertyId = document.getElementById('actionPropertySelect').value;
    if (!propertyId) { alert('Please select a property'); return; }
    try {
      await db.collection('actionPlans').add({
        propertyId: propertyId,
        issueCategory: form.issueCategory.value,
        impactLevel: form.impactLevel.value,
        assignedTo: form.assignedTo.value.trim(),
        actionDescription: form.actionDescription.value.trim(),
        status: form.status.value,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      closeActionModal();
      await renderActionsPage(document.getElementById('mainContent'));
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  async function updateAction(e) {
    e.preventDefault();
    const form = e.target;
    const actionId = form.querySelector('[name="actionId"]').value;
    try {
      await db.collection('actionPlans').doc(actionId).update({
        propertyId: form.querySelector('[name="propertyId"]').value,
        issueCategory: form.querySelector('[name="issueCategory"]').value,
        impactLevel: form.querySelector('[name="impactLevel"]').value,
        assignedTo: form.querySelector('[name="assignedTo"]').value.trim(),
        actionDescription: form.querySelector('[name="actionDescription"]').value.trim(),
        status: form.querySelector('[name="status"]').value
      });
      closeEditActionModal();
      await renderActionsPage(document.getElementById('mainContent'));
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  async function deleteAction(id) {
    if (!confirm("Delete this action plan?")) return;
    try {
      await db.collection('actionPlans').doc(id).delete();
      await renderActionsPage(document.getElementById('mainContent'));
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  // Initialize
  loadTheme();
  initializeFirebase();

  // Expose functions globally
  window.navigateTo = navigateTo;
  window.toggleTheme = toggleTheme;
  window.handleLogin = handleLogin;
  window.handleLogout = handleLogout;
  window.openPropertyModal = openPropertyModal;
  window.closePropertyModal = closePropertyModal;
  window.openEditPropertyModal = openEditPropertyModal;
  window.closeEditPropertyModal = closeEditPropertyModal;
  window.saveProperty = saveProperty;
  window.updateProperty = updateProperty;
  window.deleteProperty = deleteProperty;
  window.openReviewModal = openReviewModal;
  window.closeReviewModal = closeReviewModal;
  window.openEditReviewModal = openEditReviewModal;
  window.closeEditReviewModal = closeEditReviewModal;
  window.saveReview = saveReview;
  window.updateReview = updateReview;
  window.deleteReview = deleteReview;
  window.openActionModal = openActionModal;
  window.closeActionModal = closeActionModal;
  window.openEditActionModal = openEditActionModal;
  window.closeEditActionModal = closeEditActionModal;
  window.saveAction = saveAction;
  window.updateAction = updateAction;
  window.deleteAction = deleteAction;
</script>
